version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: data-broker-platform:latest
    container_name: data-broker-api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      MAINLAYER_API_KEY: ${MAINLAYER_API_KEY:-}
      MAINLAYER_BASE_URL: ${MAINLAYER_BASE_URL:-https://api.mainlayer.xyz}
      MAINLAYER_TIMEOUT_SECONDS: ${MAINLAYER_TIMEOUT_SECONDS:-10}
      HOST: 0.0.0.0
      PORT: 8000
      RELOAD: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STORAGE_PATH: /data/datasets.json
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - dataset_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  dataset_data:
    driver: local
